name: pennyplank
description: A new Flutter project.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  shared_preferences: ^2.2.2
  fl_chart: ^0.66.0
  uuid: ^4.4.0
  google_fonts: ^6.1.0
  flutter_animate: ^4.5.0
  flutter_blurhash: ^0.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.6

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/3.png"
  min_sdk_android: 21

flutter_native_splash:
  color: "#000000"
  image: assets/2.png
  android: true
  ios: false

  android_12:
    color: "#000000"
    image: assets/2.png

flutter:
  uses-material-design: true
  assets:
    - assets/1.png
    - assets/2.png